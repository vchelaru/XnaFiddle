<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>XnaFiddle</title>
    <base href="./" />
    <link href="css/app.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@vscode/codicons@0.0.35/dist/codicon.css" />
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <style>
        /* Diagnostics splitter height lives here (not inline on the element) so the
           coarse-pointer rule can fatten it for finger dragging on mobile (issue #91). */
        #diagnosticsSplitter { height: 4px; }
        @media (pointer: coarse) { #diagnosticsSplitter { height: 12px; } }

        @media (pointer: coarse) {
            /* Decouple the finger hit-target from the thin visible bar: a transparent
               ::before overhangs ~17px onto BOTH neighbours (editor + canvas), giving a
               ~44px grab zone (Apple/Material min touch target) without fattening the
               visible line. Pointer events on the overhang still target #splitter, so the
               existing capture / _uiDragging drag logic is unchanged. inset:-17px extends
               every side, which is what we want in either orientation. Issue #102. */
            #splitter::before {
                content: '';
                position: absolute;
                inset: -17px;
            }
        }
    </style>
</head>

<body>

    <div id="app">
        <div style="display: table-cell; margin: auto; width:100vw; height:100vh; vertical-align: middle; background: #000;">
            <div style="display: block; margin: auto; width: 9em; color: white; font-family: 'Segoe UI', sans-serif;">
                <div style="text-align: center; font-size: 1.8em;">loading...</div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.

        <a class="dismiss">x</a>
    </div>

    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script type="module">
        import { BrotliDecode } from './js/decode.min.js';
        window.BrotliDecode = BrotliDecode;
        var enableBrotliDecompression = false;
        Blazor.start({
            loadBootResource: function (type, name, defaultUri, integrity) {
                if (enableBrotliDecompression === true && type !== 'dotnetjs' && location.hostname !== 'localhost') {
                    return (async function () {
                        const response = await fetch(defaultUri + '.br', { cache: 'no-cache' });
                        if (!response.ok)
                            throw new Error(response.statusText);
                        const originalResponseBuffer = await response.arrayBuffer();
                        const originalResponseArray = new Int8Array(originalResponseBuffer);
                        const contentType = (type === 'dotnetwasm')
                            ? 'application/wasm'
                            : 'application/octet-stream';
                        const decompressedResponseArray = BrotliDecode(originalResponseArray);
                        return new Response(decompressedResponseArray,
                            {
                                headers: { 'content-type': contentType }
                            });
                    })();
                }
            }
        });
    </script>

    <script src="_content/nkast.Wasm.JSInterop/js/JSObject.8.0.10.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Window.8.0.10.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Document.8.0.10.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Navigator.8.0.10.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Gamepad.8.0.10.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Media.8.0.10.js"></script>
    <script src="_content/nkast.Wasm.XHR/js/XHR.8.0.10.js"></script>
    <script src="_content/nkast.Wasm.Canvas/js/Canvas.8.0.10.js"></script>
    <script src="_content/nkast.Wasm.Canvas/js/CanvasGLContext.8.0.10.js"></script>
    <script src="_content/nkast.Wasm.Audio/js/Audio.8.0.10.js"></script>
    <script src="_content/nkast.Wasm.XR/js/XR.8.0.10.js"></script>
    <script src="_content/nkast.Wasm.Clipboard/js/Clipboard.8.0.10.js"></script>

    <script src="js/build-version.js"></script>
    <script src="js/monaco-interop.js"></script>

    <script>
        // Watchdog: if a single game frame blocks JS for longer than this, the game
        // is considered hung (infinite loop, extreme busy-wait, etc.) and is stopped.
        // 5 seconds is intentionally lenient to allow slow Initialize()/LoadContent().
        var WATCHDOG_FRAME_MS = 5000;

        // ?hover=true throttle state. When hover mode is active and the mouse is not
        // over the canvas, the game runs at 2fps to save CPU. On touch devices hover
        // mode is ignored and the game always runs at full speed.
        // _hoverThrottle: whether ?hover=true was set (and device is not touch)
        // _hoverActive:   whether the mouse is currently over the canvas (or hover mode is off)
        window._hoverThrottle = false;
        window._hoverActive   = true;

        // FPS cap. _tickInterval is the minimum ms between ticks (0 = uncapped).
        // Embed mode defaults: 30fps desktop, 20fps mobile. Full editor on touch stays uncapped;
        // toolbar taps use capture-phase touchend instead (issue #90). ?fps=N overrides.
        window._tickInterval = 0;
        window._lastTickTime = 0;
        // When set, tickJS keeps the rAF loop alive but skips the heavy .NET game step so the
        // single WASM thread is free to service touch input. Set while the Examples modal is open
        // (its buttons/list-scroll are plain Blazor @onclick, which the uncapped game loop starves
        // on touch) and while a splitter is being dragged (smooth resize on touch). Issue #94.
        window._tickSuspended = false;
        window._uiDragging = false;

        function tickJS(timestamp) {
            // FPS cap: skip this tick if not enough time has elapsed since the last one.
            if (window._tickInterval > 0) {
                var now = timestamp > 0 ? timestamp : performance.now();
                var elapsed = now - window._lastTickTime;
                if (elapsed < window._tickInterval) {
                    window.requestAnimationFrame(tickJS);
                    return;
                }
                // Subtract remainder to avoid drift accumulating over time
                window._lastTickTime = now - (elapsed % window._tickInterval);
            }
            // Sync canvas drawing buffer to its container each frame
            var canvas = document.getElementById('theCanvas');
            var holder = document.getElementById('canvasHolder');
            if (canvas && holder) {
                var w = holder.clientWidth;
                var h = holder.clientHeight;
                if (canvas.width !== w || canvas.height !== h) {
                    canvas.width = w;
                    canvas.height = h;
                    // Notify KNI to update back buffer/viewport via GraphicsDeviceManager
                    window.theInstance.invokeMethod('OnCanvasResized', w, h);
                }
            }

            // Skip the heavy game step (but keep the canvas sync above, and the rAF loop) while the
            // Examples modal is open or a splitter is being dragged, so touch input isn't starved by
            // the uncapped loop. The game freezes for the brief interaction, then resumes. Touch
            // only: on desktop the loop doesn't starve @onclick/pointer input, so we don't want to
            // freeze the game behind the modal or during a drag there. Issue #94.
            if (window._touchDevice && (window._tickSuspended || window._uiDragging)) {
                window.requestAnimationFrame(tickJS);
                return;
            }

            var tickStart = performance.now();
            window.theInstance.invokeMethod('TickDotNet');
            var tickMs = performance.now() - tickStart;

            if (tickMs > WATCHDOG_FRAME_MS) {
                window.theInstance.invokeMethod('OnGameTimedOut', tickMs);
            }

            if (window._hoverThrottle && !window._hoverActive) {
                setTimeout(tickJS, 500); // 2fps when mouse is not over canvas
            } else {
                window.requestAnimationFrame(tickJS);
            }
        } // end tickJS

        // Blazor toggles this when the Examples modal opens/closes so the game step pauses while
        // the modal is up, keeping its (plain @onclick) controls and list scrolling responsive on
        // touch during a running game. Issue #94.
        window.setTickSuspended = function (v) { window._tickSuspended = !!v; };

        // Touch toolbar: capture-phase touchend + invokeMethodAsync bypasses Blazor @onclick
        // when the game loop starves the dispatcher (issue #90). Buttons use data-touch-action.
        function wireTouchToolbar() {
            if (!window._touchDevice) return;
            // A toolbar tap must be fully invisible to KNI's window-level touch listeners. We
            // trigger the action on touchend, but we ALSO stop touchstart/move/cancel from reaching
            // KNI. Otherwise KNI's TouchPanel records the press (touchstart) yet never the release
            // (we swallow touchend), leaving a dangling nativeTouchId that collides on the next tap:
            // "nativeTouchId already registered" — fatal under Debug.Assert in a Debug build, a
            // stuck phantom touch under Release. Touch events keep their initial target across the
            // sequence, so closest('[data-touch-action]') matches for every phase of the tap.
            // Issue #90.
            ['touchstart', 'touchmove', 'touchend', 'touchcancel'].forEach(function (type) {
                document.addEventListener(type, function (e) {
                    var btn = e.target.closest && e.target.closest('[data-touch-action]');
                    if (!btn) return;
                    e.stopImmediatePropagation();
                    if (type === 'touchend') {
                        e.preventDefault();
                        if (window.theInstance)
                            window.theInstance.invokeMethodAsync(btn.getAttribute('data-touch-action'));
                    }
                }, { capture: true, passive: false });
            });
        }

        // Examples modal touch isolation (issue #94).
        // Once any game has run, KNI installs window-level touch listeners that call
        // event.preventDefault() UNCONDITIONALLY in JS, before dispatching to .NET (Wasm.Dom
        // Window.<ver>.js) — and they're never removed, so this is permanent for the page. On
        // Chrome, window touchstart/touchmove are passive so that preventDefault is ignored (the
        // modal's list scrolling still works), but touchend is NOT passive, so its preventDefault
        // IS honored and suppresses the compatibility click — so the Examples modal's plain
        // @onclick (× / card / category / backdrop) never fires on touch. These document-level
        // BUBBLE listeners fire before KNI's window-level ones (document sits below window in the
        // bubble path), so stopping propagation for a touch that started inside the modal keeps
        // KNI from ever seeing it: the click is synthesized normally and @onclick works. We stop
        // all four phases so KNI sees neither the press nor the release and its TouchPanel stays
        // balanced (a lone swallowed release would dangle a nativeTouchId — issue #90 bug 2). We
        // never call preventDefault, so list scrolling is unaffected.
        function wireExampleModalTouchIsolation() {
            ['touchstart', 'touchmove', 'touchend', 'touchcancel'].forEach(function (type) {
                document.addEventListener(type, function (e) {
                    if (e.target && e.target.closest && e.target.closest('#exampleModalOverlay')) {
                        e.stopPropagation();
                    }
                }, false);
            });
        }

        // Splitter + layout logic (supports left/right and top/bottom modes)
        (function () {
            // STALE-CACHE BUILD MARKER (deterministic — bumped by hand every build we hand off for
            // testing, especially on mobile where there's no easy hard-reload and index.html/DLLs
            // cache over plain HTTP). This lives in index.html on purpose: it's the cache-prone JS,
            // so if the served page is stale the splitter shows the PREVIOUS color. applyLayout
            // paints it onto #splitter. Canonical (no-marker) accent is #007acc — reset to that
            // before merging. See the issue-workflow skill ("Build marker"). Issue #94.
            var SPLITTER_COLOR = '#007acc'; // canonical accent (no active marker)
            var splitRatio = 0.45;
            var dragging = false;
            // On touch the finger hit-target is widened separately from the visible bar
            // (transparent #splitter::before overhang, ~44px — see the CSS), so the visible
            // line stays thin. A coarse pointer means finger/stylus input, not a mouse.
            // Issue #102 (was 14px flat before). #91.
            var coarsePointer = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
            var splitterSize = coarsePointer ? 10 : 5;
            var isVertical = false;
            var collapsed = false;

            function applyLayout() {
                var panel = document.getElementById('editorPanel');
                var spl = document.getElementById('splitter');
                var holder = document.getElementById('canvasHolder');
                if (!panel || !spl || !holder) return;

                // Collapsed: hide the editor + splitter and let the canvas fill the whole
                // viewport so the game can be captured cleanly for screenshots/video (issue #74).
                // applyLayout is the single source of truth, so a window resize while collapsed
                // keeps it collapsed instead of snapping back to the split ratio.
                if (collapsed) {
                    panel.style.display = 'none';
                    spl.style.display = 'none';
                    holder.style.left = '0';
                    holder.style.top = '0';
                    holder.style.right = '0';
                    holder.style.bottom = '0';
                    return;
                }

                // editorPanel and splitter are laid out with display:flex inline; restore that
                // (a prior collapse may have set display:none).
                panel.style.display = 'flex';
                spl.style.display = 'flex';
                spl.style.background = SPLITTER_COLOR; // stale-cache build marker (issue #94)

                if (isVertical) {
                    var h = window.innerHeight;
                    var y = Math.round(splitRatio * h);
                    panel.style.width = '100%';
                    panel.style.height = y + 'px';
                    panel.style.bottom = '';
                    panel.style.right = '0';
                    spl.style.top = y + 'px';
                    spl.style.left = '0';
                    spl.style.width = '100%';
                    spl.style.height = splitterSize + 'px';
                    spl.style.cursor = 'ns-resize';
                    holder.style.top = (y + splitterSize) + 'px';
                    holder.style.left = '0';
                    holder.style.right = '0';
                } else {
                    var w = window.innerWidth;
                    var x = Math.round(splitRatio * w);
                    panel.style.width = x + 'px';
                    panel.style.height = '';
                    panel.style.bottom = '0';
                    panel.style.right = '';
                    spl.style.left = x + 'px';
                    spl.style.top = '0';
                    spl.style.width = splitterSize + 'px';
                    spl.style.height = '100vh';
                    spl.style.cursor = 'ew-resize';
                    holder.style.left = (x + splitterSize) + 'px';
                    holder.style.top = '0';
                    holder.style.right = '0';
                }
            }

            function initSplitter() {
                var spl = document.getElementById('splitter');
                if (!spl) return;

                // Pointer events unify mouse/touch/pen, so the splitter drags with a
                // finger on mobile, not just a mouse (issue #91). touch-action:none stops
                // the browser from claiming the gesture as a scroll/pan, which would
                // otherwise swallow the pointermove stream. setPointerCapture keeps the
                // drag tracking even when the pointer slides off the thin splitter.
                spl.style.touchAction = 'none';

                spl.addEventListener('pointerdown', function (e) {
                    e.preventDefault();
                    dragging = true;
                    // Pause the game step during the drag so pointermove isn't starved by the
                    // uncapped loop and the splitter tracks the finger smoothly. Issue #94.
                    window._uiDragging = true;
                    spl.setPointerCapture(e.pointerId);
                    document.body.style.cursor = isVertical ? 'ns-resize' : 'ew-resize';
                    document.body.style.userSelect = 'none';
                });

                spl.addEventListener('pointermove', function (e) {
                    if (!dragging) return;
                    if (isVertical) {
                        var h = window.innerHeight;
                        var y = Math.max(100, Math.min(e.clientY, h - 100));
                        splitRatio = y / h;
                    } else {
                        var w = window.innerWidth;
                        var x = Math.max(200, Math.min(e.clientX, w - 200));
                        splitRatio = x / w;
                    }
                    applyLayout();
                });

                function endDrag(e) {
                    if (!dragging) return;
                    dragging = false;
                    window._uiDragging = false; // resume the game step (issue #94)
                    if (spl.hasPointerCapture && spl.hasPointerCapture(e.pointerId)) {
                        spl.releasePointerCapture(e.pointerId);
                    }
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                }
                spl.addEventListener('pointerup', endDrag);
                spl.addEventListener('pointercancel', endDrag);

                window.addEventListener('resize', applyLayout);
                applyLayout();
            }

            window.setLayoutMode = function (vertical) {
                isVertical = vertical;
                splitRatio = 0.45;
                applyLayout();
            };

            window.setEditorCollapsed = function (value) {
                collapsed = value;
                applyLayout();
            };

            var observer = new MutationObserver(function () {
                if (document.getElementById('splitter')) {
                    observer.disconnect();
                    initSplitter();
                }
            });
            observer.observe(document.body, { childList: true, subtree: true });
        })();

        // Diagnostics panel vertical resize
        (function () {
            var dragging = false;
            var startY = 0;
            var startH = 0;
            var captured = null;

            // Pointer events (not mouse-only) so the diagnostics panel resizes by touch
            // on mobile too (issue #91). Delegated on document because the splitter is
            // rendered conditionally; capture redirects the stream to the element while
            // the events still bubble to these document-level listeners.
            document.addEventListener('pointerdown', function (e) {
                if (e.target && e.target.id === 'diagnosticsSplitter') {
                    e.preventDefault();
                    dragging = true;
                    window._uiDragging = true; // pause game step for a smooth drag (issue #94)
                    startY = e.clientY;
                    var panel = document.getElementById('diagnosticsPanel');
                    startH = panel ? panel.offsetHeight : 100;
                    if (e.target.setPointerCapture) {
                        e.target.setPointerCapture(e.pointerId);
                        captured = e.target;
                    }
                    document.body.style.cursor = 'ns-resize';
                    document.body.style.userSelect = 'none';
                }
            });

            document.addEventListener('pointermove', function (e) {
                if (!dragging) return;
                var panel = document.getElementById('diagnosticsPanel');
                if (!panel) return;
                var delta = startY - e.clientY;
                panel.style.height = Math.max(40, startH + delta) + 'px';
            });

            function endDrag(e) {
                if (!dragging) return;
                dragging = false;
                window._uiDragging = false; // resume the game step (issue #94)
                if (captured && captured.releasePointerCapture) {
                    try { captured.releasePointerCapture(e.pointerId); } catch (_) {}
                }
                captured = null;
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
            }
            document.addEventListener('pointerup', endDrag);
            document.addEventListener('pointercancel', endDrag);
        })();

        // In-memory content file cache — allows TitleContainer.OpenStream (which
        // does a synchronous XHR in KNI's Blazor platform) to resolve files that
        // exist only in memory (embedded example assets, drag-and-drop uploads).
        (function () {
            var files = {};
            var origOpen = XMLHttpRequest.prototype.open;
            var origSend = XMLHttpRequest.prototype.send;

            window.contentFileCache = {
                register: function (path, base64) {
                    // Blazor marshals byte[] as base64. Decode to binary string
                    // matching the OverrideMimeType charset used by KNI's TitleContainer.
                    var raw = atob(base64);
                    files[path] = raw;
                },
                unregister: function (path) { delete files[path]; },
                clear: function () { files = {}; }
            };

            XMLHttpRequest.prototype.open = function (method, url) {
                this._cfcUrl = url;
                this._cfcMethod = method;
                return origOpen.apply(this, arguments);
            };

            XMLHttpRequest.prototype.send = function () {
                try {
                    if (this._cfcMethod === 'GET' && this._cfcUrl && files[this._cfcUrl] !== undefined) {
                        var data = files[this._cfcUrl];
                        // Create a new XHR-like facade object isn't needed —
                        // we can fake the response by storing values and overriding getters.
                        this._cfcStatus = 200;
                        this._cfcResponseText = data;
                        this._cfcReadyState = 4;
                        this._cfcIntercepted = true;
                        if (this.onreadystatechange) this.onreadystatechange();
                        return;
                    }
                } catch (e) {
                    // Fall through to real XHR on any error
                }
                return origSend.apply(this, arguments);
            };

            // Override getters so KNI's C# XMLHttpRequest wrapper reads our cached values
            var statusDesc = Object.getOwnPropertyDescriptor(XMLHttpRequest.prototype, 'status');
            var responseTextDesc = Object.getOwnPropertyDescriptor(XMLHttpRequest.prototype, 'responseText');
            var readyStateDesc = Object.getOwnPropertyDescriptor(XMLHttpRequest.prototype, 'readyState');

            Object.defineProperty(XMLHttpRequest.prototype, 'status', {
                get: function () { return this._cfcIntercepted ? this._cfcStatus : statusDesc.get.call(this); },
                configurable: true
            });
            Object.defineProperty(XMLHttpRequest.prototype, 'responseText', {
                get: function () { return this._cfcIntercepted ? this._cfcResponseText : responseTextDesc.get.call(this); },
                configurable: true
            });
            Object.defineProperty(XMLHttpRequest.prototype, 'readyState', {
                get: function () { return this._cfcIntercepted ? this._cfcReadyState : readyStateDesc.get.call(this); },
                configurable: true
            });
        })();

        window.downloadFile = function (fileName, contentBase64) {
            var bytes = Uint8Array.from(atob(contentBase64), function (c) { return c.charCodeAt(0); });
            var blob = new Blob([bytes], { type: 'application/zip' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        window.clearCanvas = function () {
            var canvas = document.getElementById('theCanvas');
            if (!canvas) return;
            // A canvas permanently binds to one WebGL context type the first time getContext is
            // called (issue #25). Only clear through the type a game already bound it to —
            // window._canvasContextType is set by .NET after a game runs. If unset, the canvas
            // is unbound and there is nothing to clear; calling getContext here would wrongly
            // bind it (e.g. to webgl2) and break a later game that needs the other type.
            var type = window._canvasContextType;
            if (!type) return;
            var gl = canvas.getContext(type);
            if (gl) {
                gl.clearColor(0, 0, 0, 1);
                gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
            }
        };

        // Block mouse events that originate inside the editor panel from reaching KNI.
        // KNI registers its listeners on window (bubbling phase). Listening on document
        // (one level below window) and calling stopPropagation() prevents those events
        // from reaching window. We check the target dynamically so this works even though
        // Blazor renders #editorPanel after DOMContentLoaded.
        (function () {
            var mouseEvents = ['mousemove', 'mousedown', 'mouseup', 'mousewheel', 'wheel'];
            mouseEvents.forEach(function (type) {
                document.addEventListener(type, function (e) {
                    var editorPanel = document.getElementById('editorPanel');
                    if (editorPanel && editorPanel.contains(e.target)) {
                        e.stopPropagation();
                    }
                });
            });
        })();

        window._canvasFocused = false;

        // Wires per-canvas behavior onto #theCanvas: sizing from #canvasHolder, context-menu
        // suppression, focus tracking, and Alt-key suppression while focused. Safe to call
        // repeatedly on a freshly-created element — a Reach<->HiDef profile switch recreates the
        // canvas (Index.razor @key="_canvasGen") to get a fresh WebGL context type, and this
        // re-applies the wiring to the new one. The window-level Alt handlers in initRenderJS are
        // registered once and read the shared window._canvasFocused flag set here, so they survive
        // canvas swaps.
        window.setupCanvas = function () {
            var canvas = document.getElementById('theCanvas');
            if (!canvas) return;
            var holder = document.getElementById('canvasHolder');
            canvas.width = holder.clientWidth;
            canvas.height = holder.clientHeight;
            canvas.addEventListener("contextmenu", e => e.preventDefault());

            // Make the canvas focusable so we can track when it has focus.
            if (!canvas.hasAttribute('tabindex')) canvas.setAttribute('tabindex', '0');

            // When the canvas has focus, suppress Alt+key so the browser menu doesn't activate.
            canvas.addEventListener('focus', function () { window._canvasFocused = true; });
            canvas.addEventListener('blur',  function () { window._canvasFocused = false; });
            canvas.addEventListener('keydown', function (e) {
                if (e.altKey) e.preventDefault();
            });
        };

        window.initRenderJS = (instance) => {
            // KNI's JS files (Canvas.8.0.10.js etc.) expect the Emscripten Module object on
            // globalThis. Blazor no longer exposes it there by default, so we bridge the gap.
            // Blazor.runtime.Module is an internal API — if it moves in a future Blazor version
            // this will throw here with a clear message rather than failing silently later in KNI.
            if (!globalThis.Module) {
                if (!Blazor.runtime?.Module)
                    throw new Error("[XnaFiddle] Blazor.runtime.Module is not available. " +
                        "The Blazor runtime internal API may have changed. Update the Module shim in index.html.");
                globalThis.Module = Blazor.runtime.Module;
            }

            // KNI also calls Blazor.platform.getArrayLength, which was removed from Blazor's
            // public surface. Polyfill it if absent so KNI array interop continues to work.
            if (typeof Blazor.platform.getArrayLength !== "function")
            {
                Object.assign(Blazor.platform,
                {
                    getArrayLength: function (arr) {
                        var arrPtr = Blazor.platform.getArrayEntryPtr(arr, 0, 4);
                        return Module.HEAP32[(arrPtr - 4) >> 2];
                    }
                });
            }

            window.theInstance = instance;

            window.setupCanvas();

            // Intercept Alt+key at the window level while the canvas is focused, because some
            // browsers fire the menu on keyup rather than keydown. Registered once here (they
            // survive canvas swaps) and read the shared window._canvasFocused flag that
            // setupCanvas wires onto each freshly-created canvas element.
            window.addEventListener('keydown', function (e) {
                if (e.altKey && window._canvasFocused) e.preventDefault();
            }, true);
            window.addEventListener('keyup', function (e) {
                if (e.altKey && window._canvasFocused) e.preventDefault();
            }, true);

            var params = new URLSearchParams(window.location.search);
            var isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
            window._touchDevice = isTouchDevice;

            // FPS cap — embed: 30fps desktop / 20fps mobile. Full editor stays uncapped on touch
            // (toolbar uses touchend bypass — issue #90). ?fps=N overrides.
            var fpsParam = parseInt(params.get('fps'), 10);
            var isEmbed  = params.get('embed') === 'true';
            var targetFps = 0;
            if (!isNaN(fpsParam) && fpsParam > 0) {
                targetFps = fpsParam;
            } else if (isEmbed) {
                targetFps = isTouchDevice ? 20 : 30;
            }
            window._tickInterval = targetFps > 0 ? (1000 / targetFps) : 0;

            wireTouchToolbar();
            wireExampleModalTouchIsolation();

            // ?hover=true — throttle to 2fps when mouse is not over the canvas.
            // Ignored on touch devices (no hover concept; touch FPS capped separately — issue #90).
            if (params.get('hover') === 'true' && !isTouchDevice) {
                window._hoverThrottle = true;
                window._hoverActive   = false; // start throttled until first hover
                holder.addEventListener('mouseenter', function () { window._hoverActive = true; });
                holder.addEventListener('mouseleave', function () { window._hoverActive = false; });
            }

            window.requestAnimationFrame(tickJS);
        };

    </script>
