name: E2E Smoke Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      # The static host serves the published WASM app from here (see PublishOutput.cs).
      E2E_PUBLISH_DIR: ${{ github.workspace }}/artifacts/e2e-publish
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Publish Blazor WASM app
        run: dotnet publish XnaFiddle.BlazorGL/XnaFiddle.BlazorGL.csproj -c Release -o "$E2E_PUBLISH_DIR"

      - name: Build E2E test project
        run: dotnet build XnaFiddle.E2E.Tests/XnaFiddle.E2E.Tests.csproj -c Release

      - name: Install Playwright Chromium (with OS deps)
        shell: pwsh
        run: XnaFiddle.E2E.Tests/bin/Release/net8.0/playwright.ps1 install --with-deps chromium

      - name: Run E2E smoke test
        run: dotnet test XnaFiddle.E2E.Tests/XnaFiddle.E2E.Tests.csproj -c Release --no-build
