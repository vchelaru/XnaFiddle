name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      # This is the real deploy: the published output is uploaded as the GitHub Pages artifact below.
      # (The E2E workflow also runs `dotnet publish`, but only to serve the app locally to a test
      # browser — see e2e.yml. Same command, different purpose.)
      - name: Publish for GitHub Pages deploy
        run: dotnet publish XnaFiddle.BlazorGL/XnaFiddle.BlazorGL.csproj -c Release -o output

      - name: Add .nojekyll
        run: New-Item -Path output/wwwroot/.nojekyll -ItemType File -Force
        shell: pwsh

      - name: Upload Pages artifact
        # Do NOT upgrade to v4+ — v4 excludes dotfiles by default with no opt-out,
        # which would drop .nojekyll and break GitHub Pages builds.
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
